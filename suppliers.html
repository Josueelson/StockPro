<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro - Fournisseurs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="app" class="min-h-screen bg-gray-100 flex"></div>
  <div id="modal" class="modal-overlay hidden"></div>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw 0;
    Layout.init().then(() => load());
    let suppliers = [], stockEntries = [], editingId = null, currentPage = 1;

    async function load() {
      [suppliers, stockEntries] = await Promise.all([Data.getSuppliers(), Data.getStockEntries()]);
      currentPage = 1; render();
    }

    function render() {
      const s = document.getElementById('si')?.value?.toLowerCase() || '';
      const sf = document.getElementById('sf')?.value || '';
      let f = suppliers.filter(sup => {
        const ms = sup.name.toLowerCase().includes(s) || (sup.contact_name || '').toLowerCase().includes(s);
        const mf = !sf || (sf === 'active' ? sup.is_active : !sup.is_active);
        return ms && mf;
      });
      const active = suppliers.filter(s => s.is_active).length;
      const paged = Data.paginate(f, currentPage, 50);

      document.getElementById('page-content').innerHTML = `<div class="space-y-5">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div><h1 class="text-2xl font-bold text-gray-800">Fournisseurs</h1><p class="text-gray-500 text-sm">Gérez vos fournisseurs et consultez l'historique des livraisons</p></div>
          <button onclick="openModal()" class="btn-primary text-white px-5 py-2.5 rounded-lg flex items-center gap-2 font-semibold text-sm"><i data-lucide="plus" class="w-4 h-4"></i>Nouveau Fournisseur</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-blue-100 rounded-lg"><i data-lucide="truck" class="w-5 h-5 text-blue-600"></i></div><div><p class="text-xs text-gray-500">Total</p><p class="text-2xl font-bold">${suppliers.length}</p></div></div></div>
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-green-100 rounded-lg"><i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i></div><div><p class="text-xs text-gray-500">Actifs</p><p class="text-2xl font-bold text-green-600">${active}</p></div></div></div>
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-amber-100 rounded-lg"><i data-lucide="shopping-cart" class="w-5 h-5 text-amber-600"></i></div><div><p class="text-xs text-gray-500">Total Livraisons</p><p class="text-2xl font-bold">${stockEntries.filter(e => e.supplier_id).length}</p></div></div></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4"><div class="flex gap-3">
          <div class="flex-1 relative"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i><input type="text" id="si" value="${s}" oninput="render()" placeholder="Rechercher..." class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm"></div>
          <select id="sf" onchange="render()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">Tous</option><option value="active" ${sf === 'active' ? 'selected' : ''}>Actifs</option><option value="inactive" ${sf === 'inactive' ? 'selected' : ''}>Inactifs</option></select>
        </div></div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Fournisseur</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Contact</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Téléphone</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Email</th>
            <th class="px-5 py-3 text-right text-xs font-semibold text-gray-600">Livraisons</th>
            <th class="px-5 py-3 text-center text-xs font-semibold text-gray-600">Statut</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Actions</th>
          </tr></thead><tbody class="divide-y divide-gray-100">
            ${paged.data.map(sup => {
        const supEntries = stockEntries.filter(e => e.supplier_id === sup.id); return `<tr class="table-row">
              <td class="px-5 py-3"><p class="font-medium text-gray-800">${sup.name}</p><p class="text-xs text-gray-400">${sup.address || ''}</p></td>
              <td class="px-5 py-3 text-gray-600">${sup.contact_name || '-'}</td>
              <td class="px-5 py-3 text-gray-600">${sup.phone || '-'}</td>
              <td class="px-5 py-3 text-gray-600">${sup.email || '-'}</td>
              <td class="px-5 py-3 text-right font-semibold text-gray-700">${supEntries.length}</td>
              <td class="px-5 py-3 text-center"><span class="badge ${sup.is_active ? 'badge-success' : 'badge-gray'}">${sup.is_active ? 'Actif' : 'Inactif'}</span></td>
              <td class="px-5 py-3"><div class="flex items-center gap-1">
                <button onclick="showHistory('${sup.id}')" class="p-1.5 hover:bg-blue-100 rounded-lg text-blue-600" title="Historique"><i data-lucide="history" class="w-4 h-4"></i></button>
                <button onclick="editSup('${sup.id}')" class="p-1.5 hover:bg-gray-100 rounded-lg text-gray-600" title="Modifier"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                <button onclick="delSup('${sup.id}','${sup.name.replace(/'/g, "\\'")}')}" class="p-1.5 hover:bg-red-100 rounded-lg text-red-600" title="Supprimer"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
              </div></td>
            </tr>`;
      }).join('')}
            ${paged.data.length === 0 ? '<tr><td colspan="7" class="px-5 py-12 text-center text-gray-500">Aucun fournisseur</td></tr>' : ''}
          </tbody></table></div>
          ${Data.renderPagination(paged.total, paged.page, paged.perPage, 'goPage')}
        </div></div>`;
      lucide.createIcons();
    }

    function goPage(p) { currentPage = p; render(); }

    function showHistory(supId) {
      const sup = suppliers.find(s => s.id === supId);
      const hist = stockEntries.filter(e => e.supplier_id === supId);
      const total = hist.reduce((s, e) => s + Number(e.total_value), 0);
      document.getElementById('modal').innerHTML = `<div class="modal-content modal-content-lg">
        <div class="p-5 border-b flex items-center justify-between"><h2 class="text-xl font-bold">Historique — ${sup.name}</h2><button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <div class="p-5">
          <div class="flex gap-6 mb-4"><div><p class="text-xs text-gray-500">Livraisons</p><p class="text-2xl font-bold">${hist.length}</p></div><div><p class="text-xs text-gray-500">Valeur Totale</p><p class="text-2xl font-bold text-green-600">${total.toLocaleString()} FC</p></div></div>
          <div class="overflow-x-auto border rounded-lg"><table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="px-4 py-2 text-left text-xs">Date</th><th class="px-4 py-2 text-left text-xs">Produit</th><th class="px-4 py-2 text-right text-xs">Quantité</th><th class="px-4 py-2 text-right text-xs">Prix</th><th class="px-4 py-2 text-right text-xs">Valeur</th></tr></thead>
            <tbody>${hist.map(e => `<tr class="border-t"><td class="px-4 py-2 text-gray-500">${new Date(e.entry_date).toLocaleDateString('fr-FR')}</td><td class="px-4 py-2 font-medium">${e.product_name}</td><td class="px-4 py-2 text-right">${e.quantity}</td><td class="px-4 py-2 text-right">${Number(e.price_per_carton).toLocaleString()} FC</td><td class="px-4 py-2 text-right font-medium text-green-600">${Number(e.total_value).toLocaleString()} FC</td></tr>`).join('')}
            ${hist.length === 0 ? '<tr><td colspan="5" class="px-4 py-6 text-center text-gray-500">Aucune livraison enregistrée</td></tr>' : ''}</tbody>
          </table></div>
        </div></div>`;
      document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
    }

    function openModal(sup) {
      editingId = sup ? sup.id : null;
      document.getElementById('modal').innerHTML = `<div class="modal-content">
        <div class="p-5 border-b flex items-center justify-between"><h2 class="text-xl font-bold">${sup ? 'Modifier' : 'Nouveau'} Fournisseur</h2><button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <form id="sf" class="p-5 space-y-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Nom *</label><input type="text" id="fn" required value="${sup?.name || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Contact</label><input type="text" id="fc" value="${sup?.contact_name || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label><input type="text" id="fp" value="${sup?.phone || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" id="fe" value="${sup?.email || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Statut</label><select id="fst" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="true" ${sup?.is_active !== false ? 'selected' : ''}>Actif</option><option value="false" ${sup?.is_active === false ? 'selected' : ''}>Inactif</option></select></div>
          </div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Adresse</label><input type="text" id="fa" value="${sup?.address || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Notes</label><textarea id="fnotes" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">${sup?.notes || ''}</textarea></div>
          <div class="flex gap-3"><button type="button" onclick="closeModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-medium text-sm">Annuler</button><button type="submit" class="flex-1 btn-primary text-white py-2.5 rounded-lg font-medium text-sm">${sup ? 'Enregistrer' : 'Créer'}</button></div>
        </form></div>`;
      document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
      document.getElementById('sf').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="animate-spin mr-2" data-lucide="loader-2"></i> Traitement...`;
        lucide.createIcons();

        const u = Auth.getUser();
        const d = { name: document.getElementById('fn').value, contactName: document.getElementById('fc').value, phone: document.getElementById('fp').value, email: document.getElementById('fe').value, address: document.getElementById('fa').value, notes: document.getElementById('fnotes').value, isActive: document.getElementById('fst').value === 'true', createdBy: u.id };
        try {
          if (editingId) {
            await Data.updateSupplier(editingId, d);
            await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Modification fournisseur', module: 'Fournisseurs', details: d.name });
            alert('Fournisseur mis à jour avec succès !');
          } else {
            await Data.addSupplier(d);
            await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Ajout fournisseur', module: 'Fournisseurs', details: d.name });
            alert('Fournisseur créé avec succès !');
          }
          closeModal(); await load();
        } catch (err) {
          alert('Erreur: ' + err.message);
          btn.disabled = false;
          btn.innerHTML = originalText;
          lucide.createIcons();
        }
      };
    }
    function editSup(id) { openModal(suppliers.find(s => s.id === id)); }
    async function delSup(id, name) {
      if (!confirm(`Supprimer le fournisseur "${name}" ?`)) return;
      const u = Auth.getUser();
      try {
        await Data.deleteSupplier(id);
        await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Suppression fournisseur', module: 'Fournisseurs', details: name });
        await load();
      } catch (err) {
        alert(`Impossible de supprimer "${name}" car il est lié à des entrées de stock.`);
      }
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); editingId = null; }
  </script>
</body>

</html>
