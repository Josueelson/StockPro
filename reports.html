<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro - Rapports</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="app" class="min-h-screen bg-gray-100 flex"></div>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw 0;
    Layout.init().then(() => load());
    let products = [], invoices = [], clients = [], cashTransactions = [], logs = [], activities = [], returns = [];
    let selectedReport = 'stock', fd = '', td = '';

    async function load() {
      [products, invoices, clients, cashTransactions, logs, activities, returns] = await Promise.all([
        Data.getProducts(), Data.getInvoices(), Data.getClients(), Data.getCashTransactions(),
        Data.getLogs(), Data.getActivities(), Data.getReturns()
      ]);
      render();
    }

    const tabs = [
      { id: 'stock', label: 'État du Stock', icon: 'package' },
      { id: 'sales', label: 'Rapport Ventes', icon: 'trending-up' },
      { id: 'clients', label: 'Clients', icon: 'users' },
      { id: 'cash', label: 'Mouvement Caisse', icon: 'dollar-sign' },
      { id: 'activities', label: 'Activités', icon: 'activity' },
      { id: 'returns', label: 'Avoirs', icon: 'rotate-ccw' },
      { id: 'logs', label: 'Journal', icon: 'file-text' },
    ];

    function render() {
      document.getElementById('page-content').innerHTML = `<div class="space-y-5">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div><h1 class="text-2xl font-bold text-gray-900">Rapports</h1><p class="text-gray-500 text-sm">Consultez et exportez les rapports de l'entrepôt</p></div>
          <div class="flex gap-2">
            <div class="date-filter">
              <input type="date" id="fd" value="${fd}" onchange="setFilter()" class="text-sm border border-gray-300 rounded-lg px-3 py-2">
              <span class="text-gray-400">→</span>
              <input type="date" id="td" value="${td}" onchange="setFilter()" class="text-sm border border-gray-300 rounded-lg px-3 py-2">
            </div>
            <button onclick="exportCSV()" class="flex items-center gap-2 px-4 py-2 bg-amber-500 text-white rounded-lg hover:bg-amber-600 text-sm font-medium"><i data-lucide="download" class="w-4 h-4"></i>Export CSV</button>
          </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-1"><div class="flex flex-wrap gap-1">
          ${tabs.map(t => `<button onclick="selectReport('${t.id}')" class="flex items-center gap-2 px-3 py-2 rounded-lg transition-colors text-sm ${selectedReport === t.id ? 'bg-amber-500 text-white' : 'text-gray-600 hover:bg-gray-100'}"><i data-lucide="${t.icon}" class="w-4 h-4"></i>${t.label}</button>`).join('')}
        </div></div>
        <div id="report-content"></div></div>`;
      lucide.createIcons();
      renderReport();
    }

    function setFilter() {
      fd = document.getElementById('fd').value;
      td = document.getElementById('td').value;
      renderReport();
    }

    function selectReport(id) { selectedReport = id; render(); }

    function filterPeriod(data, dateField) {
      return Data.filterByPeriod(data, dateField, fd, td);
    }

    function renderReport() {
      const el = document.getElementById('report-content');
      switch (selectedReport) {
        case 'stock': renderStock(el); break;
        case 'sales': renderSales(el); break;
        case 'clients': renderClients(el); break;
        case 'cash': renderCash(el); break;
        case 'activities': renderActivities(el); break;
        case 'returns': renderReturns(el); break;
        case 'logs': renderLogs(el); break;
      }
      lucide.createIcons();
    }

    function renderStock(el) {
      const data = fd || td ? filterPeriod(products, 'created_at') : products;
      const low = data.filter(p => p.stock_level <= p.min_stock_level);
      const out = data.filter(p => p.stock_level === 0);
      const tv = data.reduce((s, p) => s + Number(p.price_per_carton) * p.stock_level, 0);
      el.innerHTML = `<div class="space-y-4">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div class="bg-white p-5 rounded-xl shadow-sm"><p class="text-xs text-gray-500">Total Produits</p><p class="text-2xl font-bold">${data.length}</p></div>
          <div class="bg-white p-5 rounded-xl shadow-sm"><p class="text-xs text-gray-500">Stock Faible</p><p class="text-2xl font-bold text-amber-600">${low.length}</p></div>
          <div class="bg-white p-5 rounded-xl shadow-sm"><p class="text-xs text-gray-500">Rupture</p><p class="text-2xl font-bold text-red-600">${out.length}</p></div>
          <div class="bg-white p-5 rounded-xl shadow-sm"><p class="text-xs text-gray-500">Valeur Stock</p><p class="text-2xl font-bold text-green-600">${tv.toLocaleString()} FC</p></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm">
          <thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Produit</th><th class="px-4 py-3 text-left text-xs">Catégorie</th><th class="px-4 py-3 text-right text-xs">Stock</th><th class="px-4 py-3 text-right text-xs">Prix/Carton</th><th class="px-4 py-3 text-right text-xs">Valeur</th><th class="px-4 py-3 text-center text-xs">Statut</th></tr></thead>
          <tbody>${data.map(p => `<tr class="border-t hover:bg-gray-50"><td class="px-4 py-3 font-medium">${p.name}</td><td class="px-4 py-3 text-gray-600">${p.category || '-'}</td><td class="px-4 py-3 text-right">${p.stock_level}</td><td class="px-4 py-3 text-right">${Number(p.price_per_carton).toLocaleString()} FC</td><td class="px-4 py-3 text-right font-medium">${(Number(p.price_per_carton) * p.stock_level).toLocaleString()} FC</td><td class="px-4 py-3 text-center"><span class="badge ${p.stock_level === 0 ? 'badge-danger' : p.stock_level <= p.min_stock_level ? 'badge-warning' : 'badge-success'}">${p.stock_level === 0 ? 'Rupture' : p.stock_level <= p.min_stock_level ? 'Faible' : 'OK'}</span></td></tr>`).join('')}</tbody>
        </table></div></div></div>`;
    }

    function renderSales(el) {
      const data = filterPeriod(invoices, 'created_at');
      const tr = data.reduce((s, i) => s + Number(i.total), 0);
      const paid = data.filter(i => i.status === 'paid').reduce((s, i) => s + Number(i.total), 0);
      const avg = data.length ? tr / data.length : 0;
      el.innerHTML = `<div class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white p-5 rounded-xl shadow-sm"><p class="text-xs text-gray-500">Total Factures</p><p class="text-2xl font-bold">${data.length}</p></div>
          <div class="bg-white p-5 rounded-xl shadow-sm"><p class="text-xs text-gray-500">CA Encaissé</p><p class="text-2xl font-bold text-green-600">${paid.toLocaleString()} FC</p></div>
          <div class="bg-white p-5 rounded-xl shadow-sm"><p class="text-xs text-gray-500">Panier Moyen</p><p class="text-2xl font-bold text-purple-600">${Math.round(avg).toLocaleString()} FC</p></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm">
          <thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left text-xs">N° Facture</th><th class="px-4 py-3 text-left text-xs">Date</th><th class="px-4 py-3 text-left text-xs">Client</th><th class="px-4 py-3 text-right text-xs">Total</th><th class="px-4 py-3 text-right text-xs">Payé</th><th class="px-4 py-3 text-center text-xs">Statut</th></tr></thead>
          <tbody>${data.map(i => `<tr class="border-t hover:bg-gray-50"><td class="px-4 py-3 font-medium">${i.invoice_number}</td><td class="px-4 py-3 text-gray-600">${new Date(i.created_at).toLocaleDateString('fr-FR')}</td><td class="px-4 py-3">${i.client_name}</td><td class="px-4 py-3 text-right font-medium">${Number(i.total).toLocaleString()} FC</td><td class="px-4 py-3 text-right">${Number(i.amount_paid || 0).toLocaleString()} FC</td><td class="px-4 py-3 text-center"><span class="badge ${i.status === 'paid' ? 'badge-success' : i.status === 'partially_paid' ? 'badge-info' : i.status === 'pending' ? 'badge-warning' : 'badge-danger'}">${i.status === 'paid' ? 'Payée' : i.status === 'partially_paid' ? 'Partiel' : i.status === 'pending' ? 'En attente' : 'Annulée'}</span></td></tr>`).join('')}</tbody>
        </table></div></div></div>`;
    }

    function renderClients(el) {
      const inv = filterPeriod(invoices, 'created_at');
      const clientMap = {};
      inv.filter(i => i.status === 'paid').forEach(i => { clientMap[i.client_name] = (clientMap[i.client_name] || 0) + Number(i.total); });
      el.innerHTML = `<div class="space-y-4">
        <div class="bg-white p-5 rounded-xl shadow-sm"><p class="text-xs text-gray-500">Total Clients</p><p class="text-2xl font-bold">${clients.length}</p></div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm">
          <thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left text-xs">Nom</th><th class="px-4 py-3 text-left text-xs">Location</th><th class="px-4 py-3 text-left text-xs">Téléphone</th><th class="px-4 py-3 text-right text-xs">CA Total</th></tr></thead>
          <tbody>${clients.map(c => `<tr class="border-t hover:bg-gray-50"><td class="px-4 py-3 font-medium">${c.name}</td><td class="px-4 py-3 text-gray-600">${c.location}</td><td class="px-4 py-3">${c.phone}</td><td class="px-4 py-3 text-right font-medium text-green-600">${(clientMap[c.name] || 0).toLocaleString()} FC</td></tr>`).join('')}</tbody>
        </table></div></div></div>`;
    }

    function renderCash(el) {
      // BUG FIX P2.1: Inclure 'activity' dans les sorties
      const data = filterPeriod(cashTransactions, 'created_at');
      const ti = data.filter(t => Data.isIncome(t.type)).reduce((s, t) => s + Number(t.amount), 0);
      const to = data.filter(t => !Data.isIncome(t.type)).reduce((s, t) => s + Number(t.amount), 0);
      el.innerHTML = `<div class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white p-5 rounded-xl shadow-sm"><p class="text-xs text-gray-500">Entrées</p><p class="text-2xl font-bold text-green-600">${ti.toLocaleString()} FC</p></div>
          <div class="bg-white p-5 rounded-xl shadow-sm"><p class="text-xs text-gray-500">Sorties (toutes)</p><p class="text-2xl font-bold text-red-600">${to.toLocaleString()} FC</p></div>
          <div class="bg-white p-5 rounded-xl shadow-sm"><p class="text-xs text-gray-500">Solde Période</p><p class="text-2xl font-bold ${ti - to >= 0 ? 'text-blue-600' : 'text-red-600'}">${(ti - to).toLocaleString()} FC</p></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm">
          <thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left text-xs">Date</th><th class="px-4 py-3 text-left text-xs">Type</th><th class="px-4 py-3 text-left text-xs">Description</th><th class="px-4 py-3 text-right text-xs">Montant</th></tr></thead>
          <tbody>${data.map(t => { const isIn = Data.isIncome(t.type); return `<tr class="border-t hover:bg-gray-50"><td class="px-4 py-3 text-gray-600">${new Date(t.created_at).toLocaleDateString('fr-FR')}</td><td class="px-4 py-3"><span class="badge ${isIn ? 'badge-success' : 'badge-danger'}">${t.type === 'invoice_payment' ? 'Paiement' : t.type === 'deposit' ? 'Dépôt' : t.type === 'expense' ? 'Dépense' : t.type === 'withdrawal' ? 'Retrait' : t.type === 'activity' ? 'Activité' : t.type === 'return' ? 'Avoir' : 'Autre'}</span></td><td class="px-4 py-3">${t.description}</td><td class="px-4 py-3 text-right font-medium ${isIn ? 'text-green-600' : 'text-red-600'}">${isIn ? '+' : '-'}${Number(t.amount).toLocaleString()} FC</td></tr>`; }).join('')}</tbody>
        </table></div></div></div>`;
    }

    function renderActivities(el) {
      const data = filterPeriod(activities, 'date');
      const totalCost = data.reduce((s, a) => s + Number(a.cost || 0), 0);
      el.innerHTML = `<div class="space-y-4">
        <div class="bg-white p-5 rounded-xl shadow-sm flex gap-8">
          <div><p class="text-xs text-gray-500">Total Activités</p><p class="text-2xl font-bold">${data.length}</p></div>
          <div><p class="text-xs text-gray-500">Coût Total</p><p class="text-2xl font-bold text-orange-600">${totalCost.toLocaleString()} FC</p></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm">
          <thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left text-xs">Date</th><th class="px-4 py-3 text-left text-xs">Titre</th><th class="px-4 py-3 text-left text-xs">Description</th><th class="px-4 py-3 text-right text-xs">Coût</th><th class="px-4 py-3 text-center text-xs">Statut</th></tr></thead>
          <tbody>${data.map(a => `<tr class="border-t hover:bg-gray-50"><td class="px-4 py-3 text-gray-600">${new Date(a.date).toLocaleDateString('fr-FR')}</td><td class="px-4 py-3 font-medium">${a.title}</td><td class="px-4 py-3 text-gray-600">${a.description}</td><td class="px-4 py-3 text-right">${Number(a.cost || 0).toLocaleString()} FC</td><td class="px-4 py-3 text-center"><span class="badge ${a.status === 'completed' ? 'badge-success' : a.status === 'pending' ? 'badge-warning' : 'badge-danger'}">${a.status === 'completed' ? 'Terminée' : a.status === 'pending' ? 'En Cours' : 'Annulée'}</span></td></tr>`).join('')}</tbody>
        </table></div></div></div>`;
    }

    function renderReturns(el) {
      const data = filterPeriod(returns, 'created_at');
      const total = data.filter(r => r.status === 'approved').reduce((s, r) => s + Number(r.total), 0);
      el.innerHTML = `<div class="space-y-4">
        <div class="bg-white p-5 rounded-xl shadow-sm flex gap-8">
          <div><p class="text-xs text-gray-500">Total Avoirs</p><p class="text-2xl font-bold">${data.length}</p></div>
          <div><p class="text-xs text-gray-500">Montant Remboursé</p><p class="text-2xl font-bold text-red-600">${total.toLocaleString()} FC</p></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm">
          <thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left text-xs">N° Avoir</th><th class="px-4 py-3 text-left text-xs">Client</th><th class="px-4 py-3 text-left text-xs">Motif</th><th class="px-4 py-3 text-right text-xs">Total</th><th class="px-4 py-3 text-center text-xs">Statut</th></tr></thead>
          <tbody>${data.map(r => `<tr class="border-t hover:bg-gray-50"><td class="px-4 py-3 font-medium">${r.return_number}</td><td class="px-4 py-3">${r.client_name}</td><td class="px-4 py-3 text-gray-600">${r.reason}</td><td class="px-4 py-3 text-right font-medium">${Number(r.total).toLocaleString()} FC</td><td class="px-4 py-3 text-center"><span class="badge ${r.status === 'approved' ? 'badge-success' : r.status === 'pending' ? 'badge-warning' : 'badge-danger'}">${r.status === 'approved' ? 'Approuvé' : r.status === 'pending' ? 'En attente' : 'Annulé'}</span></td></tr>`).join('')}</tbody>
        </table></div></div></div>`;
    }

    function renderLogs(el) {
      const data = filterPeriod(logs, 'created_at').slice(0, 100);
      el.innerHTML = `<div class="bg-white rounded-xl shadow-sm overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm">
          <thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left text-xs">Date</th><th class="px-4 py-3 text-left text-xs">Utilisateur</th><th class="px-4 py-3 text-left text-xs">Action</th><th class="px-4 py-3 text-left text-xs">Module</th><th class="px-4 py-3 text-left text-xs">Détails</th></tr></thead>
          <tbody>${data.map(l => `<tr class="border-t hover:bg-gray-50"><td class="px-4 py-3 text-gray-500 text-xs whitespace-nowrap">${new Date(l.created_at).toLocaleString('fr-FR')}</td><td class="px-4 py-3 font-medium">${l.user_name}</td><td class="px-4 py-3">${l.action}</td><td class="px-4 py-3"><span class="badge badge-gray">${l.module}</span></td><td class="px-4 py-3 text-gray-600">${l.details}</td></tr>`).join('')}</tbody>
        </table></div></div>`;
    }

    function exportCSV() {
      let csv = '';
      const fInv = filterPeriod(invoices, 'created_at');
      const fCash = filterPeriod(cashTransactions, 'created_at');
      const fAct = filterPeriod(activities, 'date');
      const fRet = filterPeriod(returns, 'created_at');
      switch (selectedReport) {
        case 'stock': csv = ['Produit,Catégorie,Stock,Prix/Carton,Valeur,Statut', ...products.map(p => `"${p.name}","${p.category}",${p.stock_level},${p.price_per_carton},${Number(p.price_per_carton) * p.stock_level},${p.stock_level === 0 ? 'Rupture' : p.stock_level <= p.min_stock_level ? 'Faible' : 'OK'}`)].join('\n'); break;
        case 'sales': csv = ['N° Facture,Date,Client,Total,Payé,Statut', ...fInv.map(i => `"${i.invoice_number}","${new Date(i.created_at).toLocaleDateString('fr-FR')}","${i.client_name}",${i.total},${i.amount_paid || 0},"${i.status}"`)].join('\n'); break;
        case 'clients': csv = ['Nom,Location,Téléphone,Email', ...clients.map(c => `"${c.name}","${c.location}","${c.phone}","${c.email || ''}"`)].join('\n'); break;
        case 'cash': csv = ['Date,Type,Description,Montant,Entrée/Sortie', ...fCash.map(t => `"${new Date(t.created_at).toLocaleDateString('fr-FR')}","${t.type}","${t.description}",${t.amount},"${Data.isIncome(t.type) ? 'Entrée' : 'Sortie'}"`)].join('\n'); break;
        case 'activities': csv = ['Date,Titre,Description,Coût,Statut', ...fAct.map(a => `"${a.date}","${a.title}","${a.description}",${a.cost || 0},"${a.status}"`)].join('\n'); break;
        case 'returns': csv = ['N° Avoir,Client,Motif,Total,Statut', ...fRet.map(r => `"${r.return_number}","${r.client_name}","${r.reason}",${r.total},"${r.status}"`)].join('\n'); break;
        case 'logs': csv = ['Date,Utilisateur,Action,Module,Détails', ...logs.slice(0, 200).map(l => `"${new Date(l.created_at).toLocaleString('fr-FR')}","${l.user_name}","${l.action}","${l.module}","${l.details}"`)].join('\n'); break;
      }
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a'); link.href = URL.createObjectURL(blob);
      link.download = `rapport_${selectedReport}_${new Date().toISOString().split('T')[0]}.csv`; link.click();
    }
    load();
  </script>
</body>

</html>
