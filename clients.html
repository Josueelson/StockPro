<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro - Clients</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="app" class="min-h-screen bg-gray-100 flex"></div>
  <div id="modal" class="modal-overlay hidden"></div>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw 0;
    Layout.init().then(() => load());
    let clients = [], invoices = [], editingId = null, currentPage = 1;
    const PER_PAGE = 50;

    async function load() {
      [clients, invoices] = await Promise.all([Data.getClients(), Data.getInvoices()]);
      currentPage = 1; render();
    }

    function render() {
      const s = document.getElementById('si')?.value?.toLowerCase() || '';
      const f = clients.filter(c => c.name.toLowerCase().includes(s) || (c.phone || '').includes(s) || (c.location || '').toLowerCase().includes(s));
      const paged = Data.paginate(f, currentPage, PER_PAGE);

      document.getElementById('page-content').innerHTML = `<div class="space-y-5">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div><h1 class="text-2xl font-bold text-gray-800">Gestion Clients</h1><p class="text-gray-500 text-sm">Fidélisez et gérez vos relations clients</p></div>
          <button onclick="openModal()" class="btn-primary text-white px-5 py-2.5 rounded-lg flex items-center gap-2 font-semibold text-sm"><i data-lucide="user-plus" class="w-4 h-4"></i>Nouveau Client</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white rounded-xl shadow-sm p-4 flex items-center gap-3"><div class="p-2 bg-blue-100 rounded-lg"><i data-lucide="users" class="w-5 h-5 text-blue-600"></i></div><div><p class="text-xs text-gray-500">Total Clients</p><p class="text-xl font-bold">${clients.length}</p></div></div>
          <div class="bg-white rounded-xl shadow-sm p-4 flex items-center gap-3"><div class="p-2 bg-green-100 rounded-lg"><i data-lucide="shopping-bag" class="w-5 h-5 text-green-600"></i></div><div><p class="text-xs text-gray-500">Ventes Totales</p><p class="text-xl font-bold">${invoices.filter(i => i.status === 'paid').length}</p></div></div>
          <div class="bg-white rounded-xl shadow-sm p-4 flex items-center gap-3"><div class="p-2 bg-amber-100 rounded-lg"><i data-lucide="star" class="w-5 h-5 text-amber-600"></i></div><div><p class="text-xs text-gray-500">Nouveaux ce mois</p><p class="text-xl font-bold">${clients.filter(c => new Date(c.created_at).getMonth() === new Date().getMonth()).length}</p></div></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4">
          <div class="relative"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i><input type="text" id="si" oninput="render()" value="${s}" placeholder="Rechercher par nom, téléphone ou adresse..." class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm"></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600 uppercase">Client</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600 uppercase">Téléphone</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600 uppercase">Adresse / Quartier</th>
            <th class="px-5 py-3 text-right text-xs font-semibold text-gray-600 uppercase">Dernier Achat</th>
            <th class="px-5 py-3 text-right text-xs font-semibold text-gray-600 uppercase">Total Achat</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600 uppercase">Actions</th>
          </tr></thead><tbody class="divide-y divide-gray-100">
            ${paged.data.map(c => {
        const ci = invoices.filter(i => i.client_id === c.id || (i.client_name === c.name && !i.client_id));
        const total = ci.filter(i => i.status === 'paid').reduce((s, i) => s + Number(i.total), 0);
        const last = ci.length ? new Date(ci[0].created_at).toLocaleDateString('fr-FR') : 'Jamais';
        return `<tr class="table-row">
                  <td class="px-5 py-4 font-medium text-gray-800">${c.name}</td>
                  <td class="px-5 py-4 text-gray-600">${c.phone || '-'}</td>
                  <td class="px-5 py-4 text-gray-600">${c.location || '-'}</td>
                  <td class="px-5 py-4 text-right text-gray-500">${last}</td>
                  <td class="px-5 py-4 text-right font-bold text-green-600">${total.toLocaleString()} FC</td>
                  <td class="px-5 py-4"><div class="flex items-center gap-1">
                    <button onclick="editC('${c.id}')" class="p-1.5 hover:bg-gray-100 rounded-lg text-gray-600"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                    <button onclick="delC('${c.id}','${c.name.replace(/'/g, "\\'")}')}" class="p-1.5 hover:bg-red-100 rounded-lg text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                  </div></td>
                </tr>`;
      }).join('')}
            ${paged.data.length === 0 ? '<tr><td colspan="6" class="px-5 py-12 text-center text-gray-500 whitespace-nowrap">Aucun client trouvé</td></tr>' : ''}
          </tbody></table></div>
          ${Data.renderPagination(paged.total, paged.page, paged.perPage, 'goPage')}
        </div></div>`;
      lucide.createIcons();
    }

    function goPage(p) { currentPage = p; render(); }

    function openModal(c) {
      editingId = c ? c.id : null;
      document.getElementById('modal').innerHTML = `<div class="modal-content">
        <div class="p-5 border-b flex items-center justify-between"><h2 class="text-xl font-bold">${c ? 'Modifier' : 'Nouveau'} Client</h2><button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <form id="cf" class="p-5 space-y-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Nom / Société *</label><input type="text" id="fn" required value="${c?.name || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label><input type="text" id="fp" value="${c?.phone || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Adresse / Quartier</label><input type="text" id="fl" value="${c?.location || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Notes</label><textarea id="fno" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">${c?.notes || ''}</textarea></div>
          <div class="flex gap-3 pt-2"><button type="button" onclick="closeModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-medium text-sm">Annuler</button><button type="submit" class="flex-1 btn-primary text-white py-2.5 rounded-lg font-medium text-sm">${c ? 'Enregistrer' : 'Créer'}</button></div>
        </form></div>`;
      document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
      document.getElementById('cf').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="animate-spin mr-2" data-lucide="loader-2"></i> Traitement...`;
        lucide.createIcons();

        const u = Auth.getUser();
        const d = { name: document.getElementById('fn').value, phone: document.getElementById('fp').value, location: document.getElementById('fl').value, notes: document.getElementById('fno').value, createdBy: u.id };
        try {
          if (editingId) {
            await Data.updateClient(editingId, d);
            await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Modification client', module: 'Clients', details: d.name });
            alert('Client mis à jour avec succès !');
          } else {
            await Data.addClient(d);
            await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Ajout client', module: 'Clients', details: d.name });
            alert('Client créé avec succès !');
          }
          closeModal(); await load();
        } catch (err) {
          alert('Erreur: ' + err.message);
          btn.disabled = false;
          btn.innerHTML = originalText;
          lucide.createIcons();
        }
      };
    }
    function editC(id) { openModal(clients.find(c => c.id === id)); }
    async function delC(id, name) {
      if (!confirm(`Supprimer "${name}" ?`)) return;
      const u = Auth.getUser();
      try {
        await Data.deleteClient(id);
        await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Suppression client', module: 'Clients', details: name });
        await load();
      } catch (err) { alert(`Impossible de supprimer "${name}" car ce client a des factures enregistrées.`); }
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); editingId = null; }
  </script>
</body>

</html>
