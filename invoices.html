<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro - Factures</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="app" class="min-h-screen bg-gray-100 flex"></div>
  <div id="modal" class="modal-overlay hidden"></div>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw 0;
    Layout.init().then(() => load());
    let invoices = [], clients = [], products = [], items = [], currentPage = 1;
    const PER_PAGE = 50;

    async function load() {
      [invoices, clients, products] = await Promise.all([Data.getInvoices(), Data.getClients(), Data.getProducts()]);
      currentPage = 1; render();
    }

    function render() {
      const s = document.getElementById('si')?.value?.toLowerCase() || '';
      const sf = document.getElementById('sf')?.value || '';
      const fd = document.getElementById('fd')?.value || '';
      const td = document.getElementById('td')?.value || '';
      let f = invoices.filter(i => {
        const ms = i.invoice_number.toLowerCase().includes(s) || i.client_name.toLowerCase().includes(s);
        const mf = !sf || i.status === sf;
        return ms && mf;
      });
      if (fd || td) f = Data.filterByPeriod(f, 'created_at', fd, td);

      const paid = invoices.filter(i => i.status === 'paid').reduce((a, i) => a + Number(i.total), 0);
      const pend = invoices.filter(i => i.status === 'pending').reduce((a, i) => a + Number(i.total), 0);
      const partial = invoices.filter(i => i.status === 'partially_paid').reduce((a, i) => a + Number(i.total) - Number(i.amount_paid), 0);

      const paged = Data.paginate(f, currentPage, PER_PAGE);

      document.getElementById('page-content').innerHTML = `<div class="space-y-6">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div><h1 class="text-2xl font-bold text-gray-800">Factures (Sorties)</h1><p class="text-gray-500 text-sm">Gérez vos factures et sorties de stock</p></div>
          <button onclick="openCreate()" class="btn-primary text-white px-6 py-2.5 rounded-lg flex items-center gap-2 font-semibold"><i data-lucide="plus" class="w-5 h-5"></i>Nouvelle Facture</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-green-100 rounded-lg"><i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i></div><div><p class="text-xs text-gray-500">Montant Encaissé</p><p class="text-xl font-bold text-green-600">${paid.toLocaleString()} FC</p></div></div></div>
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-yellow-100 rounded-lg"><i data-lucide="clock" class="w-5 h-5 text-yellow-600"></i></div><div><p class="text-xs text-gray-500">En Attente</p><p class="text-xl font-bold text-yellow-600">${pend.toLocaleString()} FC</p></div></div></div>
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-blue-100 rounded-lg"><i data-lucide="minus-circle" class="w-5 h-5 text-blue-600"></i></div><div><p class="text-xs text-gray-500">Reste à Payer (Partiel)</p><p class="text-xl font-bold text-blue-600">${partial.toLocaleString()} FC</p></div></div></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4">
          <div class="flex flex-col md:flex-row gap-3">
            <div class="flex-1 relative"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i><input type="text" id="si" value="${s}" oninput="render()" placeholder="Rechercher..." class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm"></div>
            <select id="sf" onchange="render()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">Tous statuts</option><option value="paid" ${sf === 'paid' ? 'selected' : ''}>Payée</option><option value="partially_paid" ${sf === 'partially_paid' ? 'selected' : ''}>Partiel</option><option value="pending" ${sf === 'pending' ? 'selected' : ''}>En attente</option><option value="cancelled" ${sf === 'cancelled' ? 'selected' : ''}>Annulée</option></select>
            <div class="date-filter">
              <input type="date" id="fd" value="${fd}" onchange="render()" class="text-sm">
              <span class="text-gray-400 text-sm">→</span>
              <input type="date" id="td" value="${td}" onchange="render()" class="text-sm">
            </div>
          </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full"><thead class="bg-gray-50"><tr>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">N° Facture</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Client</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Date</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Total</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Payé</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Statut</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Actions</th>
            </tr></thead><tbody class="divide-y divide-gray-100">
              ${paged.data.map(i => `<tr class="table-row">
                <td class="px-5 py-3 font-medium text-gray-800 text-sm">${i.invoice_number}</td>
                <td class="px-5 py-3 text-gray-600 text-sm">${i.client_name}</td>
                <td class="px-5 py-3 text-xs text-gray-500">${new Date(i.created_at).toLocaleDateString('fr-FR')}</td>
                <td class="px-5 py-3 font-semibold text-sm">${Number(i.total).toLocaleString()} FC</td>
                <td class="px-5 py-3 text-sm ${Number(i.amount_paid) >= Number(i.total) ? 'text-green-600 font-semibold' : 'text-gray-500'}">${Number(i.amount_paid || 0).toLocaleString()} FC</td>
                <td class="px-5 py-3"><span class="badge ${i.status === 'paid' ? 'badge-success' : i.status === 'partially_paid' ? 'badge-info' : i.status === 'pending' ? 'badge-warning' : 'badge-danger'}">${i.status === 'paid' ? 'Payée' : i.status === 'partially_paid' ? 'Partiel' : i.status === 'pending' ? 'En attente' : 'Annulée'}</span></td>
                <td class="px-5 py-3"><div class="flex items-center gap-1">
                  <button onclick="viewInv('${i.id}')" class="p-1.5 hover:bg-gray-100 rounded-lg text-gray-600" title="Voir"><i data-lucide="eye" class="w-4 h-4"></i></button>
                  ${i.status !== 'paid' && i.status !== 'cancelled' ? `<button onclick="openPayment('${i.id}')" class="p-1.5 hover:bg-green-100 rounded-lg text-green-600" title="Paiement"><i data-lucide="credit-card" class="w-4 h-4"></i></button>` : ''}
                  <button onclick="delInv('${i.id}','${i.invoice_number}')" class="p-1.5 hover:bg-red-100 rounded-lg text-red-600" title="Supprimer"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div></td>
              </tr>`).join('')}
              ${paged.data.length === 0 ? '<tr><td colspan="7" class="px-5 py-10 text-center text-gray-500 text-sm">Aucune facture trouvée</td></tr>' : ''}
            </tbody></table>
          </div>
          ${Data.renderPagination(paged.total, paged.page, paged.perPage, 'goPage')}
        </div></div>`;
      lucide.createIcons();
    }

    function goPage(p) { currentPage = p; render(); }

    function openCreate() {
      items = [];
      document.getElementById('modal').innerHTML = `<div class="modal-content modal-content-lg"><div class="p-5 border-b flex items-center justify-between"><h2 class="text-xl font-bold">Nouvelle Facture</h2><button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <form id="invf" class="p-5 space-y-5">
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Client *</label><select id="fc" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">Sélectionner</option>${clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
          <div class="border rounded-lg p-4"><h3 class="font-medium text-gray-800 mb-3 text-sm">Produits</h3>
            <div class="flex gap-3 mb-3">
              <select id="fp" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">Sélectionner un produit</option>${products.filter(p => p.stock_level > 0).map(p => `<option value="${p.id}" data-name="${p.name}" data-price="${p.price_per_carton}" data-stock="${p.stock_level}">${p.name} (${p.stock_level} dispo) — ${Number(p.price_per_carton).toLocaleString()} FC</option>`).join('')}</select>
              <input type="number" id="fq" min="1" value="1" class="w-20 px-3 py-2 border border-gray-300 rounded-lg text-sm">
              <button type="button" onclick="addItem()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm"><i data-lucide="plus" class="w-4 h-4"></i></button>
            </div>
            <div id="items-list"></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Statut</label><select id="fst" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="pending">En attente</option><option value="paid">Payée intégralement</option></select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Mode de paiement</label><select id="fpm" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">Non spécifié</option><option value="cash">Espèces</option><option value="transfer">Virement</option><option value="check">Chèque</option></select></div>
          </div>
          <div class="flex gap-3 pt-2"><button type="button" onclick="closeModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-medium text-sm">Annuler</button><button type="submit" id="sub-btn" class="flex-1 btn-primary text-white py-2.5 rounded-lg font-medium text-sm disabled:opacity-50" disabled>Créer la Facture</button></div>
        </form></div>`;
      document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
      document.getElementById('invf').onsubmit = async (e) => {
        e.preventDefault();
        const cl = clients.find(c => c.id === document.getElementById('fc').value);
        if (!cl || items.length === 0) return;

        const btn = document.getElementById('sub-btn');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="animate-spin mr-2" data-lucide="loader-2"></i> Création...`;
        lucide.createIcons();

        try {
          const u = Auth.getUser();
          const sub = items.reduce((s, i) => s + i.total, 0);
          await Data.addInvoice({ clientId: cl.id, clientName: cl.name, items: items.map(i => ({ productId: i.productId, productName: i.productName, quantity: i.quantity, pricePerCarton: i.pricePerCarton, total: i.total })), subtotal: sub, tax: 0, total: sub, status: document.getElementById('fst').value, paymentMethod: document.getElementById('fpm').value || null, createdBy: u.id });
          await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Création facture', module: 'Factures', details: `Facture pour ${cl.name} — ${sub.toLocaleString()} FC` });
          alert('Facture créée avec succès !');
          closeModal(); await load();
        } catch (err) {
          alert('Erreur: ' + err.message);
          btn.disabled = false;
          btn.innerHTML = originalText;
          lucide.createIcons();
        }
      };
    }

    function addItem() {
      const sel = document.getElementById('fp');
      const opt = sel.options[sel.selectedIndex];
      if (!opt.value) return;
      const qty = Number(document.getElementById('fq').value);
      if (qty <= 0) return;
      // BUG FIX P2.4: Vérifier que la quantité ne dépasse pas le stock
      const maxStock = Number(opt.dataset.stock);
      const existingQty = items.find(i => i.productId === opt.value)?.quantity || 0;
      if (existingQty + qty > maxStock) {
        alert(`Stock insuffisant ! Stock disponible: ${maxStock} cartons (déjà ajouté: ${existingQty})`);
        return;
      }
      const ex = items.findIndex(i => i.productId === opt.value);
      if (ex >= 0) { items[ex].quantity += qty; items[ex].total = items[ex].quantity * items[ex].pricePerCarton; }
      else { items.push({ productId: opt.value, productName: opt.dataset.name, quantity: qty, pricePerCarton: Number(opt.dataset.price), total: qty * Number(opt.dataset.price) }); }
      document.getElementById('fq').value = 1; renderItems();
    }

    function removeItem(i) { items.splice(i, 1); renderItems(); }

    function renderItems() {
      const total = items.reduce((s, i) => s + i.total, 0);
      document.getElementById('sub-btn').disabled = items.length === 0;
      document.getElementById('items-list').innerHTML = items.length === 0 ? '' : `<div class="border rounded-lg overflow-hidden"><table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="px-3 py-2 text-left">Produit</th><th class="px-3 py-2 text-left">Qté</th><th class="px-3 py-2 text-left">Prix</th><th class="px-3 py-2 text-left">Total</th><th class="px-3 py-2"></th></tr></thead><tbody>
        ${items.map((it, i) => `<tr class="border-t"><td class="px-3 py-2">${it.productName}</td><td class="px-3 py-2">${it.quantity}</td><td class="px-3 py-2">${it.pricePerCarton.toLocaleString()} FC</td><td class="px-3 py-2 font-medium">${it.total.toLocaleString()} FC</td><td class="px-3 py-2"><button type="button" onclick="removeItem(${i})" class="text-red-500 hover:text-red-700"><i data-lucide="x" class="w-4 h-4"></i></button></td></tr>`).join('')}
        </tbody><tfoot class="bg-gray-50 font-bold"><tr><td colspan="3" class="px-3 py-2 text-right">Total:</td><td colspan="2" class="px-3 py-2 text-lg">${total.toLocaleString()} FC</td></tr></tfoot></table></div>`;
      lucide.createIcons();
    }

    function viewInv(id) {
      const inv = invoices.find(i => i.id === id); if (!inv) return;
      document.getElementById('modal').innerHTML = `<div class="modal-content"><div class="p-5 border-b flex items-center justify-between"><h2 class="text-xl font-bold">Facture ${inv.invoice_number}</h2><button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <div class="p-5 space-y-4">
          <div class="flex justify-between">
            <div><p class="text-xs text-gray-500">Client</p><p class="font-medium">${inv.client_name}</p></div>
            <div class="text-right"><p class="text-xs text-gray-500">Date</p><p class="font-medium">${new Date(inv.created_at).toLocaleDateString('fr-FR')}</p></div>
          </div>
          <div class="border rounded-lg overflow-hidden"><table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="px-3 py-2 text-left">Produit</th><th class="px-3 py-2 text-right">Qté</th><th class="px-3 py-2 text-right">Total</th></tr></thead><tbody>
            ${(inv.items || []).map(it => `<tr class="border-t"><td class="px-3 py-2">${it.product_name}</td><td class="px-3 py-2 text-right">${it.quantity}</td><td class="px-3 py-2 text-right">${Number(it.total).toLocaleString()} FC</td></tr>`).join('')}
          </tbody></table></div>
          <div class="bg-gray-50 rounded-lg p-3 flex justify-between items-center">
            <span class="font-medium">Total Facture</span><span class="text-xl font-bold">${Number(inv.total).toLocaleString()} FC</span>
          </div>
          <div class="bg-blue-50 rounded-lg p-3 flex justify-between items-center">
            <span class="font-medium text-blue-700">Montant payé</span><span class="text-lg font-bold text-blue-700">${Number(inv.amount_paid || 0).toLocaleString()} FC</span>
          </div>
          <div class="text-center"><span class="badge ${inv.status === 'paid' ? 'badge-success' : inv.status === 'partially_paid' ? 'badge-info' : inv.status === 'pending' ? 'badge-warning' : 'badge-danger'}">${inv.status === 'paid' ? 'Payée' : inv.status === 'partially_paid' ? 'Paiement Partiel' : inv.status === 'pending' ? 'En attente' : 'Annulée'}</span></div>
          <div class="flex gap-2 pt-2 border-t">
            <button onclick="printInv('${inv.id}')" class="flex-1 flex items-center justify-center gap-2 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm"><i data-lucide="printer" class="w-4 h-4"></i>Imprimer</button>
          </div>
        </div></div>`;
      document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
    }

    function openPayment(invoiceId) {
      const inv = invoices.find(i => i.id === invoiceId); if (!inv) return;
      const remaining = Number(inv.total) - Number(inv.amount_paid || 0);
      document.getElementById('modal').innerHTML = `<div class="modal-content"><div class="p-5 border-b flex items-center justify-between"><h2 class="text-xl font-bold">Enregistrer un Paiement</h2><button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <form id="pf" class="p-5 space-y-4">
          <div class="bg-yellow-50 rounded-lg p-3"><p class="text-sm text-yellow-800">Facture <strong>${inv.invoice_number}</strong> — Reste à payer: <strong>${remaining.toLocaleString()} FC</strong></p></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Montant payé (FC) *</label><input type="number" id="pamt" required min="1" max="${remaining}" value="${remaining}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Mode de paiement</label><select id="pmethod" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="cash">Espèces</option><option value="transfer">Virement</option><option value="check">Chèque</option></select></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Notes</label><input type="text" id="pnotes" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="Optionnel"></div>
          <div class="flex gap-3"><button type="button" onclick="closeModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-medium text-sm">Annuler</button><button type="submit" class="flex-1 btn-primary text-white py-2.5 rounded-lg font-medium text-sm">Enregistrer</button></div>
        </form></div>`;
      document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
      document.getElementById('pf').onsubmit = async (e) => {
        e.preventDefault();
        const u = Auth.getUser();
        const amount = Number(document.getElementById('pamt').value);
        await Data.addInvoicePayment({ invoiceId: inv.id, amount, paymentMethod: document.getElementById('pmethod').value, notes: document.getElementById('pnotes').value, invoiceRef: inv.invoice_number, createdBy: u.id, description: `Paiement ${inv.invoice_number} — ${inv.client_name}` });
        await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Paiement facture', module: 'Factures', details: `Paiement ${amount.toLocaleString()} FC sur ${inv.invoice_number}` });
        closeModal(); await load();
      };
    }

    function printInv(id) {
      const inv = invoices.find(i => i.id === id); if (!inv) return;
      const w = window.open('', '_blank'); if (!w) return;
      const itemsH = (inv.items || []).map(it => `<tr><td style="padding:12px;border-bottom:1px solid #e5e7eb">${it.product_name}</td><td style="padding:12px;border-bottom:1px solid #e5e7eb;text-align:right">${it.quantity}</td><td style="padding:12px;border-bottom:1px solid #e5e7eb;text-align:right">${Number(it.price_per_carton).toLocaleString()} FC</td><td style="padding:12px;border-bottom:1px solid #e5e7eb;text-align:right">${Number(it.total).toLocaleString()} FC</td></tr>`).join('');
      w.document.write(`<!DOCTYPE html><html><head><title>Facture ${inv.invoice_number}</title><style>body{font-family:'Segoe UI',sans-serif;padding:40px;max-width:800px;margin:0 auto}.header{text-align:center;margin-bottom:40px;padding-bottom:30px;border-bottom:3px solid #1e3a5f}.cn{font-size:36px;font-weight:bold;color:#1e3a5f}table{width:100%;border-collapse:collapse;margin-bottom:30px}th{background:#1e3a5f;color:white;padding:14px;text-align:left}td{padding:14px;border-bottom:1px solid #e5e7eb}.total-block{background:linear-gradient(135deg,#1e3a5f,#2d5a8a);color:white;padding:20px;border-radius:12px;text-align:right}.footer{margin-top:40px;text-align:center;color:#9ca3af;font-size:13px}@media print{body{padding:20px}}</style></head><body>
        <div class="header"><div class="cn">StockPro</div><div>Système de Gestion d'Entrepôt</div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px">
          <div style="background:#f9fafb;padding:20px;border-radius:8px"><div style="font-size:12px;color:#6b7280">Facture N°</div><div style="font-size:18px;font-weight:600">${inv.invoice_number}</div></div>
          <div style="background:#f9fafb;padding:20px;border-radius:8px"><div style="font-size:12px;color:#6b7280">Date</div><div style="font-size:18px;font-weight:600">${new Date(inv.created_at).toLocaleDateString('fr-FR')}</div></div>
        </div>
        <div style="background:#f9fafb;padding:20px;border-radius:8px;margin-bottom:30px"><div style="font-size:12px;color:#6b7280">Client</div><div style="font-size:18px;font-weight:600">${inv.client_name}</div></div>
        <table><thead><tr><th>Produit</th><th style="text-align:right">Qté</th><th style="text-align:right">Prix Unit.</th><th style="text-align:right">Total</th></tr></thead><tbody>${itemsH}</tbody></table>
        <div class="total-block"><div style="font-size:13px;opacity:0.9">TOTAL</div><div style="font-size:28px;font-weight:bold">${Number(inv.total).toLocaleString()} FC</div></div>
        ${Number(inv.amount_paid || 0) > 0 && inv.status !== 'paid' ? `<div style="background:#eff6ff;padding:15px;border-radius:8px;text-align:right;margin-top:15px"><strong>Montant payé:</strong> ${Number(inv.amount_paid).toLocaleString()} FC — <strong>Reste:</strong> ${(Number(inv.total) - Number(inv.amount_paid)).toLocaleString()} FC</div>` : ''}
        <div class="footer"><p>Merci pour votre confiance ! — Généré par StockPro</p></div></body></html>`);
      w.document.close(); w.onload = () => w.print();
    }

    async function delInv(id, num) {
      if (!confirm(`Supprimer la facture ${num} ? Le stock sera restauré.`)) return;
      const u = Auth.getUser();
      await Data.deleteInvoice(id);
      await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Suppression facture', module: 'Factures', details: `Suppression ${num}` });
      await load();
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
  </script>
