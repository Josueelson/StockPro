<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro - Caisse</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="app" class="min-h-screen bg-gray-100 flex"></div>
  <div id="modal" class="modal-overlay hidden"></div>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw 0;
    Layout.init().then(() => load());
    let transactions = [], currentPage = 1;
    const PER_PAGE = 50;

    async function load() { transactions = await Data.getCashTransactions(); currentPage = 1; render(); }

    function render() {
      const s = document.getElementById('si')?.value?.toLowerCase() || '';
      const tf = document.getElementById('tf')?.value || '';
      const fd = document.getElementById('fd')?.value || '';
      const td = document.getElementById('td')?.value || '';
      let f = transactions.filter(t => {
        const ms = t.description.toLowerCase().includes(s) || (t.reference || '').toLowerCase().includes(s);
        const mt = !tf || t.type === tf;
        return ms && mt;
      });
      if (fd || td) f = Data.filterByPeriod(f, 'created_at', fd, td);

      const bal = transactions.reduce((b, t) => Data.isIncome(t.type) ? b + Number(t.amount) : b - Number(t.amount), 0);
      const tIn = transactions.filter(t => Data.isIncome(t.type)).reduce((s, t) => s + Number(t.amount), 0);
      const tOut = transactions.filter(t => !Data.isIncome(t.type)).reduce((s, t) => s + Number(t.amount), 0);

      const typeLabel = t => ({ invoice_payment: 'Paiement Facture', expense: 'Dépense', withdrawal: 'Retrait', deposit: 'Dépôt', activity: 'Activité', return: 'Avoir', purchase_order: 'Commande' }[t] || t);
      const paged = Data.paginate(f, currentPage, PER_PAGE);

      document.getElementById('page-content').innerHTML = `<div class="space-y-5">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div><h1 class="text-2xl font-bold text-gray-800">Gestion de la Caisse</h1><p class="text-gray-500 text-sm">Suivez les entrées et sorties de trésorerie</p></div>
          <button onclick="openModal()" class="btn-primary text-white px-5 py-2.5 rounded-lg flex items-center gap-2 font-semibold text-sm"><i data-lucide="plus" class="w-4 h-4"></i>Nouvelle Transaction</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-gradient-to-r from-amber-500 to-amber-600 rounded-xl shadow-lg p-5 text-white"><div class="flex items-center gap-3"><div class="p-2.5 bg-white/20 rounded-lg"><i data-lucide="dollar-sign" class="w-6 h-6"></i></div><div><p class="text-amber-100 text-sm">Solde Actuel</p><p class="text-3xl font-bold">${bal.toLocaleString()} FC</p></div></div></div>
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-green-100 rounded-lg"><i data-lucide="trending-up" class="w-5 h-5 text-green-600"></i></div><div><p class="text-xs text-gray-500">Total Entrées</p><p class="text-xl font-bold text-green-600">${tIn.toLocaleString()} FC</p></div></div></div>
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-red-100 rounded-lg"><i data-lucide="trending-down" class="w-5 h-5 text-red-600"></i></div><div><p class="text-xs text-gray-500">Total Sorties</p><p class="text-xl font-bold text-red-600">${tOut.toLocaleString()} FC</p></div></div></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4">
          <div class="flex flex-col md:flex-row gap-3">
            <div class="flex-1 relative"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i><input type="text" id="si" value="${s}" oninput="render()" placeholder="Rechercher..." class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm"></div>
            <select id="tf" onchange="render()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
              <option value="">Tous les types</option>
              <option value="invoice_payment" ${tf === 'invoice_payment' ? 'selected' : ''}>Paiement Facture</option>
              <option value="expense" ${tf === 'expense' ? 'selected' : ''}>Dépense</option>
              <option value="withdrawal" ${tf === 'withdrawal' ? 'selected' : ''}>Retrait</option>
              <option value="deposit" ${tf === 'deposit' ? 'selected' : ''}>Dépôt</option>
              <option value="activity" ${tf === 'activity' ? 'selected' : ''}>Activité</option>
              <option value="return" ${tf === 'return' ? 'selected' : ''}>Avoir</option>
            </select>
            <div class="date-filter">
              <input type="date" id="fd" value="${fd}" onchange="render()" class="text-sm border border-gray-300 rounded-lg px-3 py-2">
              <span class="text-gray-400">→</span>
              <input type="date" id="td" value="${td}" onchange="render()" class="text-sm border border-gray-300 rounded-lg px-3 py-2">
            </div>
          </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Date</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Type</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Description</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Référence</th>
            <th class="px-5 py-3 text-right text-xs font-semibold text-gray-600">Montant</th>
          </tr></thead><tbody class="divide-y divide-gray-100">
            ${paged.data.map(t => {
        const isIn = Data.isIncome(t.type); return `<tr class="table-row">
              <td class="px-5 py-3 text-gray-500 whitespace-nowrap">${new Date(t.created_at).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })}</td>
              <td class="px-5 py-3"><span class="badge ${isIn ? 'badge-success' : t.type === 'withdrawal' ? 'badge-warning' : 'badge-danger'}">${typeLabel(t.type)}</span></td>
              <td class="px-5 py-3 text-gray-800">${t.description}</td>
              <td class="px-5 py-3 text-gray-500 text-xs">${t.reference || '-'}</td>
              <td class="px-5 py-3 text-right"><span class="font-semibold ${isIn ? 'text-green-600' : 'text-red-600'}">${isIn ? '+' : '-'}${Number(t.amount).toLocaleString()} FC</span></td>
            </tr>`;
      }).join('')}
            ${paged.data.length === 0 ? '<tr><td colspan="5" class="px-5 py-10 text-center text-gray-500">Aucune transaction</td></tr>' : ''}
          </tbody></table></div>
          ${Data.renderPagination(paged.total, paged.page, paged.perPage, 'goPage')}
        </div></div>`;
      lucide.createIcons();
    }

    function goPage(p) { currentPage = p; render(); }

    function openModal() {
      document.getElementById('modal').innerHTML = `<div class="modal-content">
        <div class="p-5 border-b flex items-center justify-between"><h2 class="text-xl font-bold">Nouvelle Transaction</h2><button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <form id="cf" class="p-5 space-y-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Type *</label>
            <select id="ft" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
              <option value="expense">Dépense</option>
              <option value="withdrawal">Retrait (patron)</option>
              <option value="deposit">Dépôt</option>
            </select>
          </div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Montant (FC) *</label><input type="number" id="fa" required min="1" value="0" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Description *</label><textarea id="fd" required rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></textarea></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Référence (N° reçu)</label><input type="text" id="fr" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="Optionnel"></div>
          <div class="flex gap-3"><button type="button" onclick="closeModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-medium text-sm">Annuler</button><button type="submit" class="flex-1 btn-primary text-white py-2.5 rounded-lg font-medium text-sm">Enregistrer</button></div>
        </form></div>`;
      document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
      document.getElementById('cf').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="animate-spin mr-2" data-lucide="loader-2"></i> Traitement...`;
        lucide.createIcons();

        const u = Auth.getUser();
        const type = document.getElementById('ft').value;
        const amount = Number(document.getElementById('fa').value);
        const desc = document.getElementById('fd').value;
        const ref = document.getElementById('fr').value;

        try {
          await Data.addCashTransaction({ type, amount, description: desc, reference: ref, createdBy: u.id });
          const al = { expense: 'Dépense', withdrawal: 'Retrait', deposit: 'Dépôt' }[type];
          await Data.addLog({ userId: u.id, userName: u.fullName, action: al, module: 'Caisse', details: `${al}: ${amount.toLocaleString()} FC — ${desc}` });
          alert('Transaction enregistrée avec succès !');
          closeModal(); await load();
        } catch (err) {
          alert('Erreur: ' + err.message);
          btn.disabled = false;
          btn.innerHTML = originalText;
          lucide.createIcons();
        }
      };
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
  </script>
</body>

</html>
