<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro - Avoirs / Retours</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="app" class="min-h-screen bg-gray-100 flex"></div>
  <div id="modal" class="modal-overlay hidden"></div>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw 0;
    Layout.init().then(() => load());
    let returns = [], invoices = [], clients = [], products = [], items = [], currentPage = 1;

    async function load() {
      [returns, invoices, clients, products] = await Promise.all([Data.getReturns(), Data.getInvoices(), Data.getClients(), Data.getProducts()]);
      currentPage = 1; render();
    }

    function render() {
      const s = document.getElementById('si')?.value?.toLowerCase() || '';
      const sf = document.getElementById('sf')?.value || '';
      let f = returns.filter(r => { const ms = r.return_number.toLowerCase().includes(s) || r.client_name.toLowerCase().includes(s); const mf = !sf || r.status === sf; return ms && mf; });
      const total = returns.filter(r => r.status === 'approved').reduce((s, r) => s + Number(r.total), 0);
      const paged = Data.paginate(f, currentPage, 50);

      document.getElementById('page-content').innerHTML = `<div class="space-y-5">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div><h1 class="text-2xl font-bold text-gray-800">Avoirs & Retours</h1><p class="text-gray-500 text-sm">Gérez les retours de marchandises et les remboursements</p></div>
          <button onclick="openCreate()" class="btn-primary text-white px-5 py-2.5 rounded-lg flex items-center gap-2 font-semibold text-sm"><i data-lucide="plus" class="w-4 h-4"></i>Nouvel Avoir</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-orange-100 rounded-lg"><i data-lucide="rotate-ccw" class="w-5 h-5 text-orange-600"></i></div><div><p class="text-xs text-gray-500">Total Avoirs</p><p class="text-2xl font-bold">${returns.length}</p></div></div></div>
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-yellow-100 rounded-lg"><i data-lucide="clock" class="w-5 h-5 text-yellow-600"></i></div><div><p class="text-xs text-gray-500">En Attente</p><p class="text-2xl font-bold text-yellow-600">${returns.filter(r => r.status === 'pending').length}</p></div></div></div>
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-red-100 rounded-lg"><i data-lucide="dollar-sign" class="w-5 h-5 text-red-600"></i></div><div><p class="text-xs text-gray-500">Montant Remboursé</p><p class="text-2xl font-bold text-red-600">${total.toLocaleString()} FC</p></div></div></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4"><div class="flex gap-3">
          <div class="flex-1 relative"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i><input type="text" id="si" value="${s}" oninput="render()" placeholder="Rechercher..." class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm"></div>
          <select id="sf" onchange="render()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">Tous</option><option value="pending">En attente</option><option value="approved">Approuvé</option><option value="cancelled">Annulé</option></select>
        </div></div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">N° Avoir</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Client</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Facture Liée</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Motif</th>
            <th class="px-5 py-3 text-right text-xs font-semibold text-gray-600">Total</th>
            <th class="px-5 py-3 text-center text-xs font-semibold text-gray-600">Statut</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Actions</th>
          </tr></thead><tbody class="divide-y divide-gray-100">
            ${paged.data.map(r => `<tr class="table-row">
              <td class="px-5 py-3 font-medium text-gray-800">${r.return_number}</td>
              <td class="px-5 py-3 text-gray-600">${r.client_name}</td>
              <td class="px-5 py-3 text-gray-500">${r.invoice_number || '-'}</td>
              <td class="px-5 py-3 text-gray-600">${r.reason}</td>
              <td class="px-5 py-3 text-right font-semibold text-red-600">${Number(r.total).toLocaleString()} FC</td>
              <td class="px-5 py-3 text-center"><span class="badge ${r.status === 'approved' ? 'badge-success' : r.status === 'pending' ? 'badge-warning' : 'badge-danger'}">${r.status === 'approved' ? 'Approuvé' : r.status === 'pending' ? 'En attente' : 'Annulé'}</span></td>
              <td class="px-5 py-3"><div class="flex gap-1">
                ${r.status === 'pending' ? `<button onclick="approveReturn('${r.id}')" class="p-1.5 hover:bg-green-100 rounded-lg text-green-600" title="Approuver"><i data-lucide="check" class="w-4 h-4"></i></button>` : ''}
                <button onclick="delReturn('${r.id}')" class="p-1.5 hover:bg-red-100 rounded-lg text-red-600" title="Supprimer"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
              </div></td>
            </tr>`).join('')}
            ${paged.data.length === 0 ? '<tr><td colspan="7" class="px-5 py-12 text-center text-gray-500">Aucun avoir</td></tr>' : ''}
          </tbody></table></div>
        </div></div>`;
      lucide.createIcons();
    }

    function goPage(p) { currentPage = p; render(); }

    function openCreate() {
      items = [];
      document.getElementById('modal').innerHTML = `<div class="modal-content modal-content-lg">
        <div class="p-5 border-b flex items-center justify-between"><h2 class="text-xl font-bold">Nouvel Avoir / Retour</h2><button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <form id="rf" class="p-5 space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Client *</label><select id="fc" required onchange="linkInvoice()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">Sélectionner</option>${clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Facture Liée</label><select id="fi" onchange="prefillFromInvoice()" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">Aucune</option></select></div>
          </div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Motif du Retour *</label><textarea id="fr" required rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="Décrire le motif..."></textarea></div>
          <div class="border rounded-lg p-4"><h3 class="font-medium text-sm mb-3">Produits Retournés</h3>
            <div class="flex gap-3 mb-3">
              <select id="fp" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">Sélectionner</option>${products.map(p => `<option value="${p.id}" data-name="${p.name}" data-price="${p.price_per_carton}">${p.name}</option>`).join('')}</select>
              <input type="number" id="fq" min="1" value="1" class="w-20 px-3 py-2 border border-gray-300 rounded-lg text-sm">
              <button type="button" onclick="addRetItem()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"><i data-lucide="plus" class="w-4 h-4"></i></button>
            </div>
            <div id="rit"></div>
          </div>
          <div class="flex gap-3"><button type="button" onclick="closeModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-medium text-sm">Annuler</button><button type="submit" id="savebtn" class="flex-1 btn-primary text-white py-2.5 rounded-lg font-medium text-sm" disabled>Créer l'Avoir</button></div>
        </form></div>`;
      document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
      document.getElementById('rf').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('savebtn');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="animate-spin mr-2" data-lucide="loader-2"></i> Traitement...`;
        lucide.createIcons();

        const u = Auth.getUser();
        const clientId = document.getElementById('fc').value;
        const client = clients.find(c => c.id === clientId);
        const invId = document.getElementById('fi').value || null;
        const inv = invoices.find(i => i.id === invId);

        try {
          await Data.addReturn({ clientId, clientName: client.name, invoiceId: invId, invoiceNumber: inv?.invoice_number || '', reason: document.getElementById('fr').value, total: items.reduce((s, i) => s + i.total, 0), items: items.map(i => ({ productId: i.productId, productName: i.productName, quantity: i.quantity, pricePerCarton: i.pricePerCarton, total: i.total })), createdBy: u.id });
          await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Avoir créé', module: 'Avoirs', details: `${client.name} — ${items.reduce((s, i) => s + i.total, 0).toLocaleString()} FC` });
          alert('Avoir créé avec succès !');
          closeModal(); await load();
        } catch (err) {
          alert('Erreur: ' + err.message);
          btn.disabled = false;
          btn.innerHTML = originalText;
          lucide.createIcons();
        }
      };
    }

    function linkInvoice() {
      const clientId = document.getElementById('fc').value;
      const clientInvoices = invoices.filter(i => i.client_id === clientId);
      document.getElementById('fi').innerHTML = `<option value="">Aucune</option>${clientInvoices.map(i => `<option value="${i.id}">${i.invoice_number}</option>`).join('')}`;
    }

    function prefillFromInvoice() {
      const invId = document.getElementById('fi').value;
      const inv = invoices.find(i => i.id === invId);
      if (!inv || !inv.items) return;
      items = inv.items.map(it => ({ productId: it.product_id, productName: it.product_name, quantity: it.quantity, pricePerCarton: it.price_per_carton, total: it.total }));
      renderRetItems();
    }

    function addRetItem() {
      const sel = document.getElementById('fp'); const opt = sel.options[sel.selectedIndex];
      if (!opt.value) return;
      const qty = Number(document.getElementById('fq').value) || 1;
      const price = Number(opt.dataset.price) || 0;
      const ex = items.findIndex(i => i.productId === opt.value);
      if (ex >= 0) { items[ex].quantity += qty; items[ex].total = items[ex].quantity * items[ex].pricePerCarton; }
      else items.push({ productId: opt.value, productName: opt.dataset.name, quantity: qty, pricePerCarton: price, total: qty * price });
      renderRetItems();
    }

    function removeRetItem(i) { items.splice(i, 1); renderRetItems(); }

    function renderRetItems() {
      const total = items.reduce((s, i) => s + i.total, 0);
      document.getElementById('savebtn').disabled = items.length === 0;
      document.getElementById('rit').innerHTML = items.length === 0 ? '' : `<div class="border rounded-lg overflow-hidden text-sm"><table class="w-full"><thead class="bg-gray-50"><tr><th class="px-3 py-2 text-left">Produit</th><th class="px-3 py-2 text-right">Qté</th><th class="px-3 py-2 text-right">Total</th><th class="px-3 py-2"></th></tr></thead><tbody>${items.map((it, i) => `<tr class="border-t"><td class="px-3 py-2">${it.productName}</td><td class="px-3 py-2 text-right">${it.quantity}</td><td class="px-3 py-2 text-right font-medium">${it.total.toLocaleString()} FC</td><td class="px-3 py-2"><button type="button" onclick="removeRetItem(${i})" class="text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button></td></tr>`).join('')}</tbody><tfoot class="bg-gray-50"><tr><td colspan="2" class="px-3 py-2 font-bold text-right">Total avoir:</td><td colspan="2" class="px-3 py-2 font-bold text-red-600">${total.toLocaleString()} FC</td></tr></tfoot></table></div>`;
      lucide.createIcons();
    }

    async function approveReturn(id) {
      if (!confirm('Approuver cet avoir ? Le stock sera restauré et une transaction caisse créée.')) return;
      const u = Auth.getUser();
      await Data.approveReturn(id);
      await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Avoir approuvé', module: 'Avoirs', details: id });
      await load();
    }
    async function delReturn(id) {
      if (!confirm('Supprimer cet avoir ?')) return;
      await Data.deleteReturn(id); await load();
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
  </script>
</body>

</html>
