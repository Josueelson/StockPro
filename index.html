<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro - Connexion</title>
  <meta name="description" content="StockPro - Système de Gestion d'Entrepôt. Connectez-vous pour gérer votre stock.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="app" class="min-h-screen bg-gradient-to-br from-[#1e3a5f] to-[#0f172a] flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-amber-500 rounded-2xl mb-4 shadow-lg">
          <i data-lucide="package" class="w-10 h-10 text-white"></i>
        </div>
        <h1 class="text-3xl font-bold text-white">StockPro</h1>
        <p class="text-gray-400 mt-2">Système de Gestion d'Entrepôt</p>
      </div>

      <!-- Login Form -->
      <div class="bg-white rounded-2xl shadow-2xl p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Connexion</h2>

        <div id="error-msg"
          class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg flex items-center gap-3 text-red-700 hidden">
          <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
          <span class="text-sm" id="error-text"></span>
        </div>

        <form id="login-form" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Nom d'utilisateur</label>
            <input type="text" id="username"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1e3a5f] focus:border-transparent transition-all"
              placeholder="Entrez votre nom d'utilisateur" required>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
            <div class="relative">
              <input type="password" id="password"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#1e3a5f] focus:border-transparent transition-all pr-12"
                placeholder="Entrez votre mot de passe" required>
              <button type="button" id="toggle-password"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                <i data-lucide="eye" class="w-5 h-5" id="eye-icon"></i>
              </button>
            </div>
          </div>

          <button type="submit" id="login-btn"
            class="w-full btn-primary text-white py-3 rounded-lg font-semibold transition-all hover:shadow-lg disabled:opacity-50">
            Se connecter
          </button>
        </form>

        <div class="mt-6 p-3 bg-blue-50 border border-blue-100 rounded-lg flex items-center gap-2">
          <i data-lucide="shield" class="w-4 h-4 text-blue-500 flex-shrink-0"></i>
          <p class="text-xs text-blue-600">Contactez votre administrateur pour obtenir vos identifiants.</p>
        </div>
      </div>

      <p class="text-center text-gray-400 text-sm mt-6">© 2026 StockPro - Tous droits réservés</p>
    </div>
  </div>

  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script>
    // Initialize Lucide
    lucide.createIcons();

    // Check if already logged in
    Auth.init();
    if (Auth.isAuthenticated()) {
      window.location.href = 'dashboard.html';
    }

    // Toggle password
    let showPwd = false;
    document.getElementById('toggle-password').addEventListener('click', () => {
      showPwd = !showPwd;
      document.getElementById('password').type = showPwd ? 'text' : 'password';
      document.getElementById('eye-icon').setAttribute('data-lucide', showPwd ? 'eye-off' : 'eye');
      lucide.createIcons();
    });

    // Login form
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errorDiv = document.getElementById('error-msg');

      errorDiv.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Connexion...';

      try {
        const success = await Auth.login(username, password);
        if (success) {
          const user = Auth.getUser();
          await Data.addLog({
            userId: user.id,
            userName: user.fullName,
            action: 'Connexion',
            module: 'Authentification',
            details: `Connexion réussie pour ${username}`
          });
          window.location.href = 'dashboard.html';
        } else {
          document.getElementById('error-text').textContent = 'Identifiants incorrects ou compte désactivé';
          errorDiv.classList.remove('hidden');
          await Data.addLog({
            userId: 'unknown',
            userName: username,
            action: 'Tentative de connexion',
            module: 'Authentification',
            details: `Échec de connexion pour ${username}`
          });
        }
      } catch (err) {
        console.error('Login error details:', err);
        document.getElementById('error-text').textContent = 'Erreur: ' + (err.message || 'Une erreur est survenue');
        errorDiv.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>

</html>
