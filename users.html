<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro - Utilisateurs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="app" class="min-h-screen bg-gray-100 flex"></div>
  <div id="modal" class="modal-overlay hidden"></div>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw 0;
    const u = Auth.getUser();
    if (u.role !== 'admin' && u.role !== 'owner') { alert('Accès refusé'); location.href = 'dashboard.html'; throw 0; }

    Layout.init().then(() => load());
    let users = [], editingId = null;

    async function load() { users = await Data.getUsers(); render(); }

    function render() {
      const s = document.getElementById('si')?.value?.toLowerCase() || '';
      const f = users.filter(u => u.full_name.toLowerCase().includes(s) || u.username.toLowerCase().includes(s));

      document.getElementById('page-content').innerHTML = `<div class="space-y-5">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div><h1 class="text-2xl font-bold text-gray-800">Utilisateurs & Accès</h1><p class="text-gray-500 text-sm">Gérez les comptes et les permissions du personnel</p></div>
          <button onclick="openModal()" class="btn-primary text-white px-5 py-2.5 rounded-lg flex items-center gap-2 font-semibold text-sm"><i data-lucide="user-plus" class="w-4 h-4"></i>Nouveau Compte</button>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4"><div class="relative"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i><input type="text" id="si" oninput="render()" value="${s}" placeholder="Rechercher..." class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm"></div></div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          ${f.map(user => `<div class="bg-white rounded-xl shadow-sm p-6 flex flex-col items-center text-center relative">
            <div class="absolute top-4 right-4 flex gap-1">
              <button onclick="editU('${user.id}')" class="p-1.5 hover:bg-gray-100 rounded-lg text-gray-600"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
              ${user.id !== u.id ? `<button onclick="delU('${user.id}','${user.username}')" class="p-1.5 hover:bg-red-100 rounded-lg text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
            </div>
            <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-4"><span class="text-2xl font-bold text-gray-400 font-serif">${user.full_name.charAt(0)}</span></div>
            <h3 class="text-lg font-bold text-gray-800">${user.full_name}</h3>
            <p class="text-xs text-gray-500 font-mono mb-2">@${user.username}</p>
            <span class="badge ${user.role === 'admin' || user.role === 'owner' ? 'badge-danger' : 'badge-gray'} uppercase text-[10px] tracking-widest">${user.role}</span>
            <div class="w-full mt-6 pt-6 border-t flex flex-col gap-2 text-left text-xs text-gray-500">
              <div class="flex justify-between"><span>Email:</span><span class="text-gray-700">${user.email || '-'}</span></div>
              <div class="flex justify-between"><span>Tél:</span><span class="text-gray-700">${user.phone || '-'}</span></div>
              <div class="flex justify-between"><span>Créé le:</span><span class="text-gray-700">${new Date(user.created_at).toLocaleDateString('fr-FR')}</span></div>
            </div>
          </div>`).join('')}
        </div></div>`;
      lucide.createIcons();
    }

    function openModal(user) {
      editingId = user ? user.id : null;
      document.getElementById('modal').innerHTML = `<div class="modal-content">
        <div class="p-5 border-b flex items-center justify-between"><h2 class="text-xl font-bold">${user ? 'Modifier' : 'Nouveau'} Compte</h2><button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <form id="uf" class="p-5 space-y-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Nom Complet *</label><input type="text" id="ffn" required value="${user?.full_name || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Identifiant (@nom) *</label><input type="text" id="fuser" required value="${user?.username || ''}" ${user ? 'disabled' : ''} class="w-full px-3 py-2 border border-gray-300 border-gray-300 rounded-lg text-sm bg-gray-50"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Rôle *</label><select id="frole" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                <option value="gestionnaire" ${user?.role === 'gestionnaire' ? 'selected' : ''}>Gestionnaire</option>
                <option value="admin" ${user?.role === 'admin' ? 'selected' : ''}>Administrateur</option>
              </select></div>
          </div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">${user ? 'Nouveau mot de passe (laisser vide pour ne pas changer)' : 'Mot de passe *'}</label><input type="password" id="fpass" ${user ? '' : 'required'} minlength="6" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" id="fem" value="${user?.email || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label><input type="text" id="fph" value="${user?.phone || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          </div>
          <div class="flex gap-3 pt-2"><button type="button" onclick="closeModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-medium text-sm">Annuler</button><button type="submit" class="flex-1 btn-primary text-white py-2.5 rounded-lg font-medium text-sm">${user ? 'Enregistrer' : 'Créer'}</button></div>
        </form></div>`;
      document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
      document.getElementById('uf').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="animate-spin mr-2" data-lucide="loader-2"></i> Traitement...`;
        lucide.createIcons();

        const d = {
          fullName: document.getElementById('ffn').value,
          role: document.getElementById('frole').value,
          email: document.getElementById('fem').value,
          phone: document.getElementById('fph').value
        };
        const pass = document.getElementById('fpass').value;
        if (pass) d.password = pass;

        try {
          if (editingId) {
            await Data.updateUser(editingId, d);
            await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Modification utilisateur', module: 'Utilisateurs', details: d.fullName });
            alert('Utilisateur mis à jour avec succès !');
          } else {
            d.username = document.getElementById('fuser').value;
            await Data.addUser(d);
            await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Création utilisateur', module: 'Utilisateurs', details: d.fullName });
            alert('Utilisateur créé avec succès !');
          }
          closeModal();
          await load();
        } catch (err) {
          alert('Erreur: ' + err.message);
          btn.disabled = false;
          btn.innerHTML = originalText;
          lucide.createIcons();
        }
      };
    }
    function editU(id) { openModal(users.find(u => u.id === id)); }
    async function delU(id, name) {
      if (!confirm(`Supprimer définitivement l'accès de @${name} ?`)) return;
      const { error } = await supabase.from('users').delete().eq('id', id);
      if (error) alert(error.message); else await load();
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); editingId = null; }
  </script>
</body>

</html>
