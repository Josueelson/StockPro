<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro - Personnel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="app" class="min-h-screen bg-gray-100 flex"></div>
  <div id="modal" class="modal-overlay hidden"></div>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw 0;
    Layout.init().then(() => load());
    let personnel = [], editingId = null, currentPage = 1;
    const PER_PAGE = 50;

    async function load() { personnel = await Data.getPersonnel(); currentPage = 1; render(); }

    function render() {
      const s = document.getElementById('si')?.value?.toLowerCase() || '';
      const sf = document.getElementById('sf')?.value || '';
      let f = personnel.filter(p => {
        const ms = `${p.first_name} ${p.last_name} ${p.matricule}`.toLowerCase().includes(s);
        const mf = !sf || (sf === 'active' ? p.is_active : !p.is_active);
        return ms && mf;
      });
      const actif = personnel.filter(p => p.is_active).length;
      const paged = Data.paginate(f, currentPage, PER_PAGE);

      document.getElementById('page-content').innerHTML = `<div class="space-y-5">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div><h1 class="text-2xl font-bold text-gray-800">Personnel</h1><p class="text-gray-500 text-sm">Gérez les employés de l'entrepôt</p></div>
          <button onclick="openModal()" class="btn-primary text-white px-5 py-2.5 rounded-lg flex items-center gap-2 font-semibold text-sm"><i data-lucide="plus" class="w-4 h-4"></i>Ajouter</button>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-blue-100 rounded-lg"><i data-lucide="users" class="w-5 h-5 text-blue-600"></i></div><div><p class="text-xs text-gray-500">Total</p><p class="text-2xl font-bold">${personnel.length}</p></div></div></div>
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-green-100 rounded-lg"><i data-lucide="user-check" class="w-5 h-5 text-green-600"></i></div><div><p class="text-xs text-gray-500">Actifs</p><p class="text-2xl font-bold text-green-600">${actif}</p></div></div></div>
          <div class="bg-white rounded-xl shadow-sm p-5"><div class="flex items-center gap-3"><div class="p-2 bg-gray-100 rounded-lg"><i data-lucide="user-x" class="w-5 h-5 text-gray-600"></i></div><div><p class="text-xs text-gray-500">Inactifs</p><p class="text-2xl font-bold text-gray-600">${personnel.length - actif}</p></div></div></div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-4">
          <div class="flex gap-3">
            <div class="flex-1 relative"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i><input type="text" id="si" value="${s}" oninput="render()" placeholder="Rechercher..." class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm"></div>
            <select id="sf" onchange="render()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="">Tous</option><option value="active" ${sf === 'active' ? 'selected' : ''}>Actifs</option><option value="inactive" ${sf === 'inactive' ? 'selected' : ''}>Inactifs</option></select>
          </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Matricule</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Nom Complet</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Poste</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Téléphone</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Embauche</th>
            <th class="px-5 py-3 text-center text-xs font-semibold text-gray-600">Statut</th>
            <th class="px-5 py-3 text-left text-xs font-semibold text-gray-600">Actions</th>
          </tr></thead><tbody class="divide-y divide-gray-100">
            ${paged.data.map(p => `<tr class="table-row">
              <td class="px-5 py-3 font-mono text-xs text-gray-700">${p.matricule}</td>
              <td class="px-5 py-3 font-medium text-gray-800">${p.first_name} ${p.last_name}</td>
              <td class="px-5 py-3 text-gray-600">${p.position || '-'}</td>
              <td class="px-5 py-3 text-gray-600">${p.phone || '-'}</td>
              <td class="px-5 py-3 text-gray-500">${new Date(p.hire_date).toLocaleDateString('fr-FR')}</td>
              <td class="px-5 py-3 text-center"><span class="badge ${p.is_active ? 'badge-success' : 'badge-gray'}">${p.is_active ? 'Actif' : 'Inactif'}</span></td>
              <td class="px-5 py-3"><div class="flex items-center gap-1">
                <button onclick="editP('${p.id}')" class="p-1.5 hover:bg-gray-100 rounded-lg text-gray-600"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                <button onclick="delP('${p.id}','${p.first_name} ${p.last_name}')" class="p-1.5 hover:bg-red-100 rounded-lg text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
              </div></td>
            </tr>`).join('')}
            ${paged.data.length === 0 ? '<tr><td colspan="7" class="px-5 py-10 text-center text-gray-500">Aucun employé</td></tr>' : ''}
          </tbody></table></div>
          ${Data.renderPagination(paged.total, paged.page, paged.perPage, 'goPage')}
        </div></div>`;
      lucide.createIcons();
    }

    function goPage(p) { currentPage = p; render(); }

    function openModal(p) {
      editingId = p ? p.id : null;
      document.getElementById('modal').innerHTML = `<div class="modal-content">
        <div class="p-5 border-b flex items-center justify-between"><h2 class="text-xl font-bold">${p ? 'Modifier' : 'Ajouter'} un Employé</h2><button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <form id="pf" class="p-5 space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Prénom *</label><input type="text" id="ffn" required value="${p?.first_name || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Nom *</label><input type="text" id="fln" required value="${p?.last_name || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Poste</label><input type="text" id="fpos" value="${p?.position || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label><input type="text" id="fphone" value="${p?.phone || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">N° Carte ID</label><input type="text" id="fid" value="${p?.id_card_number || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Date d'embauche</label><input type="date" id="fdate" value="${p?.hire_date || new Date().toISOString().split('T')[0]}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          </div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Adresse</label><input type="text" id="faddr" value="${p?.address || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
          <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Salaire (FC)</label><input type="number" id="fsal" min="0" value="${p?.salary || 0}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Statut</label><select id="fst" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"><option value="true" ${p?.is_active !== false ? 'selected' : ''}>Actif</option><option value="false" ${p?.is_active === false ? 'selected' : ''}>Inactif</option></select></div>
          </div>
          <div class="flex gap-3"><button type="button" onclick="closeModal()" class="flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-medium text-sm">Annuler</button><button type="submit" class="flex-1 btn-primary text-white py-2.5 rounded-lg font-medium text-sm">${p ? 'Enregistrer' : 'Ajouter'}</button></div>
        </form></div>`;
      document.getElementById('modal').classList.remove('hidden'); lucide.createIcons();
      document.getElementById('pf').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="animate-spin mr-2" data-lucide="loader-2"></i> Traitement...`;
        lucide.createIcons();

        const u = Auth.getUser();
        const d = { firstName: document.getElementById('ffn').value, lastName: document.getElementById('fln').value, position: document.getElementById('fpos').value, phone: document.getElementById('fphone').value, idCardNumber: document.getElementById('fid').value, hireDate: document.getElementById('fdate').value, address: document.getElementById('faddr').value, salary: Number(document.getElementById('fsal').value), isActive: document.getElementById('fst').value === 'true', createdBy: u.id };
        try {
          if (editingId) {
            await Data.updatePersonnel(editingId, d);
            await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Modification employé', module: 'Personnel', details: `${d.firstName} ${d.lastName}` });
            alert('Employé mis à jour avec succès !');
          } else {
            await Data.addPersonnel(d);
            await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Ajout employé', module: 'Personnel', details: `${d.firstName} ${d.lastName}` });
            alert('Employé ajouté avec succès !');
          }
          closeModal(); await load();
        } catch (err) {
          alert('Erreur: ' + err.message);
          btn.disabled = false;
          btn.innerHTML = originalText;
          lucide.createIcons();
        }
      };
    }
    function editP(id) { openModal(personnel.find(p => p.id === id)); }
    async function delP(id, name) {
      if (!confirm(`Supprimer l'employé "${name}" ?`)) return;
      const u = Auth.getUser();
      try {
        await Data.deletePersonnel(id);
        await Data.addLog({ userId: u.id, userName: u.fullName, action: 'Suppression employé', module: 'Personnel', details: `Suppression: ${name}` });
        await load();
      } catch (err) {
        alert(`Impossible de supprimer "${name}". Veuillez le marquer comme inactif plutôt.`);
      }
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); editingId = null; }
  </script>
</body>

</html>
