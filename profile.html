<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro - Profil Utilisateur</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/supabase.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="app" class="min-h-screen bg-gray-100 flex"></div>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw 0;
    Layout.init().then(() => render());

    function render() {
      const u = Auth.getUser();
      document.getElementById('page-content').innerHTML = `<div class="max-w-4xl mx-auto space-y-6">
        <div><h1 class="text-2xl font-bold text-gray-800">Mon Profil</h1><p class="text-gray-500 text-sm">Gérez vos informations personnelles et votre sécurité</p></div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="md:col-span-1 space-y-6">
            <div class="bg-white rounded-xl shadow-sm p-6 text-center">
              <div class="w-24 h-24 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4"><span class="text-3xl font-bold text-amber-600">${u.fullName.charAt(0)}</span></div>
              <h2 class="text-xl font-bold text-gray-800">${u.fullName}</h2>
              <p class="text-sm text-gray-500 mt-1 uppercase tracking-wider font-semibold">${u.role}</p>
              <div class="mt-6 pt-6 border-t text-left space-y-3">
                <div class="flex items-center gap-3 text-sm text-gray-600"><i data-lucide="mail" class="w-4 h-4 text-gray-400"></i>${u.email || 'Non défini'}</div>
                <div class="flex items-center gap-3 text-sm text-gray-600"><i data-lucide="phone" class="w-4 h-4 text-gray-400"></i>${u.phone || 'Non défini'}</div>
                <div class="flex items-center gap-3 text-sm text-gray-600"><i data-lucide="calendar" class="w-4 h-4 text-gray-400"></i>Membre depuis ${new Date(u.created_at).toLocaleDateString('fr-FR')}</div>
              </div>
            </div>
          </div>
          <div class="md:col-span-2 space-y-6">
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
              <div class="p-5 border-b bg-gray-50"><h3 class="font-bold flex items-center gap-2"><i data-lucide="user" class="w-5 h-5 text-gray-400"></i>Informations Personnelles</h3></div>
              <form id="profile-form" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                  <div><label class="block text-sm font-medium text-gray-700 mb-1">Nom Complet</label><input type="text" id="fn" value="${u.fullName}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
                  <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" id="fe" value="${u.email || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
                </div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label><input type="text" id="fp" value="${u.phone || ''}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
                <div class="flex justify-end"><button type="submit" class="btn-primary text-white px-6 py-2 rounded-lg text-sm font-medium">Enregistrer les modifications</button></div>
              </form>
            </div>
            <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-amber-100">
              <div class="p-5 border-b bg-amber-50"><h3 class="font-bold text-amber-800 flex items-center gap-2"><i data-lucide="lock" class="w-5 h-5 text-amber-600"></i>Changer le mot de passe</h3></div>
              <form id="password-form" class="p-6 space-y-4">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Ancien mot de passe</label><input type="password" id="old-pass" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
                <div class="grid grid-cols-2 gap-4">
                  <div><label class="block text-sm font-medium text-gray-700 mb-1">Nouveau mot de passe</label><input type="password" id="new-pass" required minlength="6" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
                  <div><label class="block text-sm font-medium text-gray-700 mb-1">Confirmer</label><input type="password" id="confirm-pass" required minlength="6" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
                </div>
                <div class="flex justify-end"><button type="submit" class="bg-amber-500 text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-amber-600">Mettre à jour le mot de passe</button></div>
              </form>
            </div>
          </div>
        </div></div>`;
      lucide.createIcons();

      document.getElementById('profile-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="animate-spin mr-2" data-lucide="loader-2"></i> Enregistrement...`;
        lucide.createIcons();

        const d = { fullName: document.getElementById('fn').value, email: document.getElementById('fe').value, phone: document.getElementById('fp').value };
        try {
          const { data, error } = await Auth.updateProfile(u.id, d);
          if (error) throw error;
          alert('Profil mis à jour avec succès !');
          localStorage.setItem('user', JSON.stringify({ ...u, ...d }));
          location.reload();
        } catch (err) {
          alert('Erreur lors de la mise à jour: ' + err.message);
          btn.disabled = false;
          btn.innerHTML = originalText;
          lucide.createIcons();
        }
      };

      document.getElementById('password-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;

        const op = document.getElementById('old-pass').value;
        const np = document.getElementById('new-pass').value;
        const cp = document.getElementById('confirm-pass').value;

        if (np !== cp) { alert('Les nouveaux mots de passe ne correspondent pas.'); return; }

        btn.disabled = true;
        btn.innerHTML = `<i class="animate-spin mr-2" data-lucide="loader-2"></i> Mise à jour...`;
        lucide.createIcons();

        try {
          const res = await Auth.changePassword(u.username, op, np);
          if (res.success) {
            alert('Mot de passe mis à jour !');
            document.getElementById('password-form').reset();
          } else {
            throw new Error(res.message);
          }
        } catch (err) {
          alert('Erreur: ' + err.message);
        } finally {
          btn.disabled = false;
          btn.innerHTML = originalText;
          lucide.createIcons();
        }
      };
    }
  </script>
</body>

</html>
